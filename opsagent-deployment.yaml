apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsagent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: opsagent
  template:
    metadata:
      labels:
        app: opsagent
    spec:
      containers:
      - name: opsagent
        image: opsagent:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: opsagent
spec:
  type: NodePort
  selector:
    app: opsagent
  ports:
  - port: 8000
    targetPort: 8000
